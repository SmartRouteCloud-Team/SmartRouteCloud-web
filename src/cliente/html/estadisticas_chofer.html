<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estadísticas de Choferes</title>
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background: linear-gradient(135deg, #eef1f5, #dfe7f3);
        color: #1f2937;
      }


      .container {
        padding: 30px;
        max-width: 1200px;
        margin: auto;
      }


      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 25px;
        padding: 18px 22px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      }

      .title-box {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: linear-gradient(135deg, #facc15, #f97316);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }

      #nombreChofer {
        margin: 2px 0 0;
        font-size: 13px;
        color: #6b7280;
        font-weight: 600;
      }

      select {
        padding: 10px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      select:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(0,0,0,0.1);
      }

   
      .kpi-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 18px;
      }

      .kpi {
        background: white;
        padding: 18px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        display: flex;
        gap: 12px;
        align-items: center;
        transition: 0.3s;
      }

      .kpi:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      }

      .kpi span {
        font-size: 28px;
      }

      .kpi h4 {
        margin: 0;
        font-size: 12px;
        color: #6b7280;
      }

      .kpi p {
        margin: 0;
        font-size: 20px;
        font-weight: bold;
      }

  
      .system-status {
        margin-bottom: 20px;
      }

      .badge {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 999px;
        color: white;
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      }

      .ok { background: linear-gradient(135deg,#22c55e,#16a34a); }
      .medium { background: linear-gradient(135deg,#fbbf24,#f59e0b); }
      .bad { background: linear-gradient(135deg,#ef4444,#b91c1c); }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: white;
        padding: 18px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        transition: 0.3s;
        position: relative;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 40px rgba(0,0,0,0.12);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        /*background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);*/
      }

      .card h3 {
        margin: 0;
        font-size: 13px;
        color: #6b7280;
      }

      .card p {
        font-size: 30px;
        font-weight: bold;
        margin-top: 10px;
      }

   
      .green { color: #16a34a; }
      .yellow { color: #d97706; }
      .red { color: #dc2626; }

   
      .status {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 11px;
        color: white;
        font-weight: 600;
      }

      .status.green { background: #16a34a; }
      .status.yellow { background: #d97706; }
      .status.red { background: #dc2626; }

      .section {
        margin-top: 22px;
        background: rgba(255,255,255,0.75);
        backdrop-filter: blur(10px);
        padding: 22px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      }

      .section h2 {
        margin-top: 0;
        font-size: 18px;
      }

      .chart-box {
        height: 280px;
      }

   
      @media (max-width: 600px) {
        h1 {
          font-size: 18px;
        }

        .icon {
          width: 50px;
          height: 50px;
          font-size: 22px;
        }
      }

  </style>
</head>

<body>

<div class="container">


  <div class="top-bar">

    <div class="title-box">
      <div class="icon">🚚</div>
      <div>
        <h1>Estadísticas de Choferes</h1>
        <p id="nombreChofer">Juan Pérez</p>
      </div>
    </div>

    <select id="selectorChofer">
      <option value="0">Juan Pérez</option>
      <option value="1">Carlos López</option>
      <option value="2">Ana Martínez</option>
      <option value="3">Luis Hernández</option>
    </select>

  </div>


  <div class="kpi-bar">

    <div class="kpi">
      <span>📦</span>
      <div>
        <h4>Productividad</h4>
        <p id="kpiProd">0%</p>
      </div>
    </div>

    <div class="kpi">
      <span>⚡</span>
      <div>
        <h4>Eficiencia</h4>
        <p id="kpiEff">0%</p>
      </div>
    </div>

  </div>


  <div class="system-status">
    <div id="estadoGlobal" class="badge ok">Sistema OK</div>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Total Rutas</h3>
      <p id="rutas">0</p>
    </div>

    <div class="card">
      <h3>Total Entregas</h3>
      <p id="entregas">0</p>
    </div>

    <div class="card">
      <h3>Completadas</h3>
      <p id="completadas">0</p>
      <span id="estadoCompletadas" class="status"></span>
    </div>

    <div class="card">
      <h3>Fallidas</h3>
      <p id="fallidas">0</p>
      <span id="estadoFallidas" class="status"></span>
    </div>

  </div>

  <div class="section">
    <h2>Rendimiento Individual</h2>
    <div class="chart-box">
      <canvas id="graficaIndividual"></canvas>
    </div>
  </div>


  <div class="section">
    <h2>Comparativa General</h2>
    <div class="chart-box">
      <canvas id="graficaGeneral"></canvas>
    </div>
  </div>

</div>

<script>

  const choferes = [
    { nombre:"Juan Pérez", rutas:12, completadas:110, fallidas:10 },
    { nombre:"Carlos López", rutas:9, completadas:75, fallidas:20 },
    { nombre:"Ana Martínez", rutas:5, completadas:45, fallidas:35 },
    { nombre:"Luis Hernández", rutas:15, completadas:130, fallidas:5 }
  ];

  const selector = document.getElementById("selectorChofer");

  const rutas = document.getElementById("rutas");
  const entregas = document.getElementById("entregas");
  const completadas = document.getElementById("completadas");
  const fallidas = document.getElementById("fallidas");
  const nombreChofer = document.getElementById("nombreChofer");

  const kpiProd = document.getElementById("kpiProd");
  const kpiEff = document.getElementById("kpiEff");

  const estadoGlobal = document.getElementById("estadoGlobal");


  const graficaIndividual = new Chart(
      document.getElementById("graficaIndividual"),
      {
        type:"doughnut",
        data:{
          labels:["Completadas","Fallidas"],
          datasets:[{
            data:[0,0],
            backgroundColor:["#509b53","#c74747"]
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false
        }
      }
  );


  const graficaGeneral = new Chart(
    document.getElementById("graficaGeneral"),
    {
      type:"bar",
      data:{
        labels:choferes.map(c=>c.nombre),
        datasets:[
          {
            label:"Completadas",
            data:choferes.map(c=>c.completadas),
            backgroundColor:"#509b53"
          },
          {
            label:"Fallidas",
            data:choferes.map(c=>c.fallidas),
            backgroundColor:"#c74747"
          }
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false
      }
    }
  );

  function actualizar(i){

    const c = choferes[i];

    const total = c.completadas + c.fallidas;
    const tasa = Math.round((c.completadas/total)*100);

    nombreChofer.innerText = c.nombre;
    rutas.innerText = c.rutas;
    entregas.innerText = total;
    completadas.innerText = c.completadas;
    fallidas.innerText = c.fallidas;

    kpiProd.innerText = tasa + "%";
    kpiEff.innerText = Math.min(100, tasa + 5) + "%";


    completadas.className="";
    estadoCompletadas.className="status";

    if(c.completadas>=100){
      completadas.classList.add("green");
      estadoCompletadas.classList.add("green");
      estadoCompletadas.innerText="EXCELENTE";
    }else if(c.completadas>=50){
      completadas.classList.add("yellow");
      estadoCompletadas.classList.add("yellow");
      estadoCompletadas.innerText="REGULAR";
    }else{
      completadas.classList.add("red");
      estadoCompletadas.classList.add("red");
      estadoCompletadas.innerText="BAJO";
    }

    fallidas.className="";
    estadoFallidas.className="status";

    if(c.fallidas<=10){
      fallidas.classList.add("green");
      estadoFallidas.classList.add("green");
      estadoFallidas.innerText="CONTROLADO";
    }else if(c.fallidas<=25){
      fallidas.classList.add("yellow");
      estadoFallidas.classList.add("yellow");
      estadoFallidas.innerText="ATENCIÓN";
    }else{
      fallidas.classList.add("red");
      estadoFallidas.classList.add("red");
      estadoFallidas.innerText="CRÍTICO";
    }

  
    estadoGlobal.className="badge";

    if(tasa>=90){
      estadoGlobal.classList.add("ok");
      estadoGlobal.innerText="Sistema óptimo";
    }else if(tasa>=70){
      estadoGlobal.classList.add("medium");
      estadoGlobal.innerText="Sistema estable";
    }else{
      estadoGlobal.classList.add("bad");
      estadoGlobal.innerText="Alerta crítica";
    }

    graficaIndividual.data.datasets[0].data=[c.completadas,c.fallidas];
    graficaIndividual.update();

  }

  selector.addEventListener("change",e=>actualizar(e.target.value));

  actualizar(0);

</script>

</body>
</html>
