<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión y Supervisión de Rutas</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#eef1f5,#dfe7f3);
  color:#1f2937;
}

.container{
  max-width:1450px;
  margin:auto;
  padding:30px;
}

/* HEADER */

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.icon{
  width:55px;
  height:55px;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
}

/* KPIS */

.kpi-bar{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.kpi{
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:#6b7280;
}

.kpi p{
  margin:8px 0 0;
  font-size:24px;
  font-weight:bold;
}

/* CHOFERES */

.chofer-box{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.driver{
  background:white;
  padding:14px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.capacity{
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.capacity-fill{
  height:100%;
}

.low{
  background:#16a34a;
}

.medium{
  background:#f59e0b;
}

.high{
  background:#dc2626;
}

/* FORM */

.form{
  margin-top:20px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-weight:600;
}

/* FILTERS */

.filters{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* TABLE */

.table{
  margin-top:20px;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.row{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr 1fr 1fr 1fr 1fr;
  padding:12px;
  border-bottom:1px solid #eee;
  align-items:center;
  transition:0.2s;
  cursor:pointer;
}

.row:hover{
  background:#f9fafb;
}

.header{
  background:#f3f4f6;
  font-weight:700;
  cursor:default;
}

.editing{
  background:#f3f4f6 !important;
}

/* BADGES */

.badge{
  padding:6px 10px;
  border-radius:999px;
  color:white;
  font-size:11px;
  font-weight:600;
}

.activa{
  background:#16a34a;
}

.inactiva{
  background:#dc2626;
}

.pendiente{
  background:#f59e0b;
}

/* BUTTONS */

.icon-btn{
  border:none;
  cursor:pointer;
  padding:6px 8px;
  border-radius:8px;
  color:white;
  margin-right:5px;
}

.edit{
  background:#f59e0b;
}

.delete{
  background:#dc2626;
}

/* DETAIL */

.detail{
  margin-top:25px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* CHART */

.summary{
  background:white;
  padding:18px;
  border-radius:16px;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.chart-row{
  margin-bottom:18px;
}

.chart-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:13px;
  font-weight:600;
}

.chart-bg{
  width:100%;
  height:22px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

.chart-fill{
  height:100%;
  border-radius:999px;
  transition:0.4s;
}

/* DELIVERIES */

.delivery-badge{
  padding:6px 10px;
  border-radius:999px;
  color:white;
  font-size:11px;
  font-weight:600;
}

.completed{
  background:#16a34a;
}

.process{
  background:#2563eb;
}

.failed{
  background:#dc2626;
}

.waiting{
  background:#d97706;
}

/* MAP */

#map{
  width:100%;
  height:500px;
  border-radius:16px;
}

@media(max-width:900px){

  .detail-grid{
    grid-template-columns:1fr;
  }

  .row{
    grid-template-columns:1fr;
    gap:10px;
  }

}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="top-bar">

  <div style="display:flex;gap:12px;align-items:center">

    <div class="icon">🚚</div>

    <div>
      <h2>Gestión y Supervisión de Rutas</h2>
      <small>Dashboard logístico en tiempo real</small>
    </div>

  </div>

</div>

<!-- KPIS -->

<div class="kpi-bar">

  <div class="kpi">
    <h4>Total Rutas</h4>
    <p id="total">0</p>
  </div>

  <div class="kpi">
    <h4>Activas</h4>
    <p id="act">0</p>
  </div>

  <div class="kpi">
    <h4>Inactivas</h4>
    <p id="inact">0</p>
  </div>

  <div class="kpi">
    <h4>Pendientes</h4>
    <p id="pend">0</p>
  </div>

</div>

<!-- CHOFERES -->

<div class="chofer-box" id="drivers"></div>

<!-- FORM -->

<div class="form">

  <input id="nombre" placeholder="Ruta">
  <input id="origen" placeholder="Origen">
  <input id="destino" placeholder="Destino">

  <select id="chofer"></select>

  <select id="estado">
    <option value="pendiente">Pendiente</option>
    <option value="activa">Activa</option>
    <option value="inactiva">Inactiva</option>
  </select>

  <button onclick="add()" style="
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
  ">
    Guardar
  </button>

</div>

<!-- FILTERS -->

<div class="filters">

  <select id="filterEstado" onchange="render()">
    <option value="all">Todos los estados</option>
    <option value="activa">Activa</option>
    <option value="inactiva">Inactiva</option>
    <option value="pendiente">Pendiente</option>
  </select>

  <select id="filterChofer" onchange="render()">
    <option value="all">Todos los choferes</option>
  </select>

</div>

<!-- TABLE -->

<div class="table">

  <div class="row header">
    <div>Ruta</div>
    <div>Origen</div>
    <div>Destino</div>
    <div>Chofer</div>
    <div>Estado</div>
    <div>Acciones</div>
    <div>Uso</div>
  </div>

  <div id="rows"></div>

</div>

<!-- DETAIL -->

<div class="detail">

  <h2>Supervisión de entregas</h2>

  <div class="detail-grid">

    <!-- LEFT -->

    <div>

      <h3 id="detailTitle">
        Selecciona una ruta
      </h3>

      <!-- FILTER -->

      <div style="margin-bottom:15px;">

        <select
          id="deliveryFilter"
          onchange="filterDeliveries()"
          style="
            padding:10px;
            border-radius:10px;
            border:1px solid #e5e7eb;
            font-weight:600;
            width:220px;
            background:white;
          "
        >

          <option value="all">
            Todos los pedidos
          </option>

          <option value="completed">
            Entregados
          </option>

          <option value="process">
            En proceso
          </option>

          <option value="failed">
            Fallidos
          </option>

          <option value="waiting">
            Pendientes
          </option>

        </select>

      </div>

      <div id="deliveries"></div>

    </div>

    <!-- MAP -->

    <div>

      <h3>Monitoreo de ubicación</h3>

      <div id="map"></div>

    </div>

  </div>

</div>

</div>

<script type="module" src="../js/gestion_rutas_page.js"></script>

</body>
</html>
