<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vista Chofer Operación</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#eef1f5,#dfe7f3);
}

.container{padding:25px;max-width:1400px;margin:auto}

.top{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.7);
padding:18px;
border-radius:16px;
backdrop-filter:blur(10px);
}

.icon{
width:55px;height:55px;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#6366f1);
display:flex;align-items:center;justify-content:center;
color:white;font-size:22px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:18px;
}

.card{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);
padding:18px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* ROUTE */
.point{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:12px;
cursor:pointer;
margin-bottom:10px;
background:white;
}

.point:hover{background:#f3f4f6}

.num{font-weight:700;color:#6b7280;width:20px}

.dot{width:14px;height:14px;border-radius:50%}

.pending{background:#d97706}
.process{background:#2563eb}
.completed{background:#16a34a}
.failed{background:#dc2626}

/* DETAIL */
.status-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.badge{
padding:6px 10px;
border-radius:999px;
color:white;
font-size:11px;
font-weight:600;
}

.actions{
margin-top:12px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.actions button{
border:none;
padding:10px 12px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
}

.blue{background:#2563eb}
.green{background:#16a34a}
.red{background:#dc2626}

/* INCIDENTES */
textarea,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:8px;
}

.inc-btn{
margin-top:10px;
background:linear-gradient(135deg,#f59e0b,#d97706);
border:none;
padding:12px;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:600;
}

.inc{
background:white;
padding:10px;
border-radius:10px;
margin-top:8px;
font-size:13px;
}

/* MAP */
#map{height:420px;border-radius:16px}

/* MODAL */
#modalPass{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:white;
padding:22px;
border-radius:16px;
width:320px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.modal-box input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:10px;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.modal-actions button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.cancel{background:#e5e7eb}
.ok{background:#2563eb;color:white}

.error{
color:#dc2626;
font-size:12px;
display:none;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<div style="display:flex;gap:12px;align-items:center">
<div class="icon">🚚</div>

<div>
<h3 style="margin:0">Vista Chofer</h3>
<small id="driverName">Juan Pérez</small>
</div>

</div>

</div>

<div class="grid">

<div class="card">
<h3>Ruta asignada</h3>
<div id="route"></div>
</div>

<div class="card">
<h3>Detalle del pedido</h3>
<div id="detail">Selecciona un pedido</div>
</div>

</div>

<div class="grid">

<div class="card">
<h3>Mapa</h3>
<div id="map"></div>
</div>

<div class="card">

<h3>Incidencias</h3>

<select id="incTarget"></select>

<textarea id="incText" placeholder="Describe incidencia..."></textarea>

<button class="inc-btn" onclick="addInc()">
Registrar incidencia
</button>

<div id="incList"></div>

</div>

</div>

</div>

<!-- MODAL -->
<div id="modalPass">

<div class="modal-box">

<h3>Validación requerida</h3>
<p style="color:#6b7280;font-size:13px;">
Entrega mayor a $15,000 requiere autorización
</p>

<input type="password" id="passInput" placeholder="Contraseña">

<p id="passError" class="error">Contraseña incorrecta</p>

<div class="modal-actions">

<button class="cancel" onclick="closeModal()">Cancelar</button>
<button class="ok" onclick="checkPass()">Validar</button>

</div>

</div>

</div>

<script type="module" src="../js/pedidos_chofer_page.js"></script>

</body>
</html>
