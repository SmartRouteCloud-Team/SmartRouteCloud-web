<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Logística</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Montserrat', sans-serif;
    }

    .login-container {
      display: flex;
      height: 100vh;
    }

    .side-yellow {
      flex: 1;
      background-color: #FFD54F;
    }

    .side-white {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 10%;
    }

    h1 {
      margin-bottom: 2rem;
    }

    .form-control {
      border: 1px solid #000;
      height: 45px;
      margin-bottom: 1.5rem;
    }

    .btn-login {
      background-color: #FFD54F;
      border: 1px solid #000;
      border-radius: 25px;
      padding: 10px 40px;
      font-weight: bold;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <div class="side-yellow"></div>

    <div class="side-white">
      <h1>Inicio de sesión</h1>

      <div style="width: 100%; max-width: 350px;">
        
        <!-- 🔥 IMPORTANTE: IDs -->
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          placeholder="Correo electrónico"
        >

        <input 
          type="password" 
          id="password" 
          class="form-control" 
          placeholder="Contraseña"
        >

        <div class="text-center">
          <!-- 🔥 BOTÓN CON ID -->
          <button id="btnLogin" class="btn btn-login">
            Iniciar sesión
          </button>
        </div>

        <!-- 🔥 MENSAJE DE ERROR -->
        <p id="error" class="error"></p>

      </div>
    </div>

  </div>

  <!-- 🔥 SOLO ESTE SCRIPT (IMPORTANTE) -->
  <script type="module" src="./js/main.js"></script>

</body>
</html>
